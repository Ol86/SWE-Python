info:
  name: Update Member 2
  type: http
  seq: 1

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: If-Match
      value: '"0"'
  params:
    - name: id
      value: "2"
      type: path
  body:
    type: json
    data: |-
      {
          "first_name": "Updated",
          "last_name": "Member",
          "gender": "M",
          "date_of_birth": "1990-01-01",
          "member_since": "2020-01-01",
          "is_student": false,
          "email_address": "alpha@acme.de.put",
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.body
      operator: isString
    - expression: res.body
      operator: isEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

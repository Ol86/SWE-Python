info:
  name: Non-existing Email
  type: http
  seq: 6

http:
  method: GET
  url: "{{restUrl}}?email=Non.Existing@acme.com"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: email
      value: Non.Existing@acme.com
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

info:
  name: Existing username ole
  type: http
  seq: 3

http:
  method: GET
  url: "{{restUrl}}?username=ole"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: username
      value: ole
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Body: Username "ole" and ID > 0', () => {
          res.getBody()
            .content
            .forEach(patient => {
              const { username, id } = member;
              expect(username).to.be.equal('ole');
              expect(id).to.be.above(0);
            });
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

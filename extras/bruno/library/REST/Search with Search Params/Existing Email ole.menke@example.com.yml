info:
  name: Existing Email ole.menke@example.com
  type: http
  seq: 5

http:
  method: GET
  url: "{{restUrl}}?email_address=ole.menke@example.com"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: email_address
      value: ole.menke@example.com
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Body: Email ole.menke@example.com and ID > 0', () => {
          const { email_address, id } = res.getBody().content[0];
          expect(email_address).to.be.equal('ole.menke@example.com');
          expect(id).to.be.above(0);
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: length
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

info:
  name: Existing Last Name Menke
  type: http
  seq: 3

http:
  method: GET
  url: "{{restUrl}}?last_name=Menke"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: last_name
      value: Menke
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Body: Last name "Menke" and ID > 0', () => {
          res.getBody()
            .content
            .forEach(patient => {
              const { last_name, id } = member;
              expect(last_name).to.be.equal('Menke');
              expect(id).to.be.above(0);
            });
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

info:
  name: New Member
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      mutation {
        create_member(
          memberInput: {
            username: "testgraphql"
            firstname: "Test"
            lastname: "Graphql"
            gender: MALE
            date_of_birth: "1990-01-01"
            member_since: "2020-01-01"
            is_student: false
            email_address: "mutation@graphql.com"
            interests: [FANTASY]
            address: {
              postal_code: "12345"
              place: "Test"
              }
            books: [
              {
                name: "GraphQL for Beginners"
                isbn: "978-3-16-148410-0"
                author: "John Doe"
                still_borrowed: false
                genre: NON_FICTION
              }
            ]
          }
        ) {
          id
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.create.id
      operator: gte
      value: "0"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
